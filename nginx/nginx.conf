server {
    listen 80;

    # Panel web estático
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia FastAPI concentrador
    # El panel llama a /api/* y nginx lo reenvía al concentrador
    location /api/ {
        proxy_pass http://concentrador:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI docs (útil para demostrar en clase)
    location /docs {
        proxy_pass http://concentrador:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://concentrador:8000/openapi.json;
    }
}
