services:

  # Configuramos la Base de Datos — reciclado del reto 2, solo cambia el nombre de la BD
  base_datos:
    image: postgres:15
    container_name: base_datos
    environment:
      POSTGRES_DB:       parque_eolico_db
      POSTGRES_USER:     deusto
      POSTGRES_PASSWORD: deusto
    ports:
      - "5432:5432"

    # Coge todo lo que PostgreSQL guarde en su carpeta interna y hace una copia de seguridad.
    volumes:
      - volumen_postgres:/var/lib/postgresql/data

  # Concentrador FastAPI — recibe, valida y agrega los datos de las 10 turbinas.
  # Sustituye al cerebro_datos del reto 2, pero en vez de suscribirse a MQTT
  # expone un endpoint HTTP al que las turbinas envían sus datos.
  concentrador:
    build:
      context: .
      dockerfile: concentrador/Dockerfile
    container_name: concentrador
    environment:
      API_KEY:          parque_eolico_secreto
      DB_HOST:          base_datos
      DB_NAME:          parque_eolico_db
      DB_USER:          deusto
      DB_PASS:          deusto
      # Aparecen los prints al instante — reciclado del cerebro_datos del reto 2
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"     # Acceso directo a FastAPI — los docs están en localhost:8000/docs
    depends_on:
      - base_datos

  # Panel web — sirve el index.html y hace de proxy hacia la API del concentrador.
  # El navegador llama a /api/* y nginx lo redirige a http://concentrador:8000/
  panel:
    image: nginx:alpine
    container_name: panel_web
    ports:
      - "80:80"         # Panel accesible en localhost
    # Se hace uso del read only para impedir que se hagan cambios — reciclado del reto 2
    volumes:
      - ./panel/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - concentrador

  # ══════════════════════════════════════════════════════════════════════════
  # 10 TURBINAS — cada una es un contenedor independiente con sus propias
  # características. Todas usan el mismo Dockerfile pero con variables de
  # entorno distintas, igual que el sensor_tierra del reto 2 pero multiplicado.
  # ══════════════════════════════════════════════════════════════════════════

  # Turbina estándar en zona de viento moderado
  turbina_01:
    build: ./generadores
    container_name: turbina_01
    environment:
      TURBINA_ID:        "turbina_01"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2000"     # kW
      VIENTO_MEDIO:      "12.0"     # m/s — zona expuesta
      TEMP_NACELLE_BASE: "44.0"     # °C
      PROB_ERROR:        "0.10"     # 10% de datos erróneos
      INTERVALO:         "3"        # segundos entre envíos
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  # Turbina más potente del parque — mejor ubicación con más viento
  turbina_02:
    build: ./generadores
    container_name: turbina_02
    environment:
      TURBINA_ID:        "turbina_02"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2500"     # kW — mayor capacidad
      VIENTO_MEDIO:      "13.5"     # m/s — mejor posición en el parque
      TEMP_NACELLE_BASE: "46.0"
      PROB_ERROR:        "0.08"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  # Turbina antigua — menor capacidad y más fallos
  turbina_03:
    build: ./generadores
    container_name: turbina_03
    environment:
      TURBINA_ID:        "turbina_03"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "1800"     # kW — turbina más antigua, menor capacidad
      VIENTO_MEDIO:      "10.5"
      TEMP_NACELLE_BASE: "48.0"     # más caliente por antigüedad
      PROB_ERROR:        "0.15"     # más fallos por antigüedad
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  turbina_04:
    build: ./generadores
    container_name: turbina_04
    environment:
      TURBINA_ID:        "turbina_04"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2200"
      VIENTO_MEDIO:      "11.0"
      TEMP_NACELLE_BASE: "43.0"
      PROB_ERROR:        "0.10"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  # La más potente y fiable del parque — nueva y en la mejor ubicación
  turbina_05:
    build: ./generadores
    container_name: turbina_05
    environment:
      TURBINA_ID:        "turbina_05"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "3000"     # kW — la más potente del parque
      VIENTO_MEDIO:      "14.0"     # m/s — mejor ubicación
      TEMP_NACELLE_BASE: "50.0"
      PROB_ERROR:        "0.05"     # la más fiable
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  # Turbina en zona de poco viento
  turbina_06:
    build: ./generadores
    container_name: turbina_06
    environment:
      TURBINA_ID:        "turbina_06"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2000"
      VIENTO_MEDIO:      "9.0"      # m/s — zona de menor viento del parque
      TEMP_NACELLE_BASE: "42.0"
      PROB_ERROR:        "0.12"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  turbina_07:
    build: ./generadores
    container_name: turbina_07
    environment:
      TURBINA_ID:        "turbina_07"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2300"
      VIENTO_MEDIO:      "12.5"
      TEMP_NACELLE_BASE: "45.0"
      PROB_ERROR:        "0.10"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  # La más problemática del parque — 20% de fallos
  turbina_08:
    build: ./generadores
    container_name: turbina_08
    environment:
      TURBINA_ID:        "turbina_08"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "1900"
      VIENTO_MEDIO:      "11.5"
      TEMP_NACELLE_BASE: "47.0"
      PROB_ERROR:        "0.20"     # la más problemática del parque
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  turbina_09:
    build: ./generadores
    container_name: turbina_09
    environment:
      TURBINA_ID:        "turbina_09"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2100"
      VIENTO_MEDIO:      "13.0"
      TEMP_NACELLE_BASE: "44.5"
      PROB_ERROR:        "0.08"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  turbina_10:
    build: ./generadores
    container_name: turbina_10
    environment:
      TURBINA_ID:        "turbina_10"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2400"
      VIENTO_MEDIO:      "12.8"
      TEMP_NACELLE_BASE: "45.5"
      PROB_ERROR:        "0.10"
      INTERVALO:         "3"
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

volumes:
  # Coge todo lo que PostgreSQL guarde en su carpeta interna y hace una copia de seguridad.
  volumen_postgres:
