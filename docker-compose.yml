services:

  # Configuramos la Base de Datos 
  base_datos:
    image: postgres:15
    container_name: base_datos
    environment:
      POSTGRES_DB:       parque_eolico_db
      POSTGRES_USER:     deusto
      POSTGRES_PASSWORD: deusto
    ports:
      - "5432:5432"

    # Coge todo lo que PostgreSQL guarde en su carpeta interna y hace una copia de seguridad.
    volumes:
      - volumen_postgres:/var/lib/postgresql/data

  # Concentrador FastAPI recibe, valida y agrega los datos de las 10 turbinas.
  # Las turbinas envían sus datos a un endpoint HTTP.
  concentrador:
    build:
      context: .
      dockerfile: concentrador/Dockerfile
    container_name: concentrador
    environment:
      API_KEY:          parque_eolico_secreto
      DB_HOST:          base_datos
      DB_NAME:          parque_eolico_db
      DB_USER:          deusto
      DB_PASS:          deusto
      # Aparecen los prints al instante 
      PYTHONUNBUFFERED: "1"
    # Acceso directo a FastAPI — los docs están en localhost:8000/docs
    ports:
      - "8000:8000"     
    depends_on:
      - base_datos

  # Panel web sirve el index.html y hace de proxy hacia la API del concentrador.
  # El navegador llama a /api/* y nginx lo redirige a http://concentrador:8000/
  panel:
    image: nginx:alpine
    container_name: panel_web
    # Panel accesible en localhost
    ports:
      - "80:80"         
    # Se hace uso del read only para impedir que se hagan cambios
    volumes:
      - ./panel/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - concentrador

  # 10 contenedores, uno por turbina, con sus propias características. 
  # Todas usan el mismo Dockerfile pero con variables de entorno distintas.

  turbina_01:
    build: ./generadores
    container_name: turbina_01
    environment:
      TURBINA_ID:        "turbina_01"
      CONCENTRADOR_URL:  "http://concentrador:8000"
      API_KEY:           "parque_eolico_secreto"
      POTENCIA_NOMINAL:  "2000"     
      VIENTO_MEDIO:      "12.0"     
      TEMP_NACELLE_BASE: "44.0"     
      PROB_ERROR:        "0.10"     
      INTERVALO:         "3"        
      PYTHONUNBUFFERED:  "1"
    depends_on:
      - concentrador

  turbina_02:
